  /reset-password:
    post:
      tags:
        - Default
      description: Reset the password for a user
      operationId: resetPassword
      security:
        - bearerAuth: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPassword:
                  type: string
                  description: The new password to set
                token:
                  type:
                    - string
                    - "null"
                  description: The token to reset the password
              required:
