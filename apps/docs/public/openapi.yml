  "/v1/users/{user}/alters/{tag}/edit": 
    post: 
      summary: Edit a system alter
      description: "Edit a system alter by its ID. `{user}` can be `@me` to target the current OAuth user."
      security: 
        - oAuth2: 
            - alters:write
      requestBody: 
        content: 
          application/json: 
            schema: 
              type: object
